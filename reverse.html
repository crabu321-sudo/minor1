<!DOCTYPE html>
<html>
<head>
<title>Reverse Controls - Hard Mode</title>
<style>
body{
    text-align:center;
    background:#111;
    color:white;
    font-family:sans-serif;
}
canvas{
    background:#222;
    display:block;
    margin:20px auto;
}
button{
    padding:8px 15px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>Reverse Controls - Hard Mode</h2>
<p>Status: <span id="status">Normal</span></p>
<p>Score: <span id="score">0</span></p>
<canvas id="game" width="400" height="400"></canvas>
<button onclick="restartGame()">Restart Game</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player;
let obstacles = [];
let reversed = false;
let gameOver = false;
let score = 0;
let localHigh = parseInt(localStorage.getItem('reverseHighScore')) || 0;
let fallSpeed = 1;
let reverseTimer;

// Initialize Game
function init(){
    player = {x:200, y:350, w:30, h:30, speed:8}; // Faster player
    obstacles = [];
    reversed = false;
    gameOver = false;
    score = 0;
    fallSpeed = 1.5;

    document.getElementById("score").textContent = score;
    document.getElementById("status").textContent = "Normal";

    // Create obstacles
    for(let i=0; i<6; i++){
        createObstacle();
    }

    reverseTimer = setInterval(()=>{
        reversed = !reversed;
        document.getElementById("status").textContent = reversed ? "Reversed" : "Normal";
    },3000);
}

// Create obstacle
function createObstacle(){
    let size = Math.random()*30 + 20; // size 20-50
    obstacles.push({
        x: Math.random()*(400-size),
        y: Math.random()*-400,
        w: size,
        h: size,
        speed: Math.random()*2 + fallSpeed
    });
}

// Controls
document.addEventListener("keydown", e=>{
    if(gameOver) return;

    if(e.key === "ArrowLeft"){
        player.x += reversed ? player.speed : -player.speed;
    }
    if(e.key === "ArrowRight"){
        player.x += reversed ? -player.speed : player.speed;
    }

    // Keep inside canvas
    if(player.x < 0) player.x = 0;
    if(player.x > 400 - player.w) player.x = 400 - player.w;
});

// Game Loop
function update(){
    if(gameOver) return;

    ctx.clearRect(0,0,400,400);

    // Draw Player
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // Draw Obstacles
    obstacles.forEach(o=>{
        o.y += o.speed;

        ctx.fillStyle = "red";
        ctx.fillRect(o.x, o.y, o.w, o.h);

        // If passed bottom
        if(o.y > 400){
            o.y = -50;
            o.x = Math.random()*(400-o.w);

            score++;
            fallSpeed += 0.1; // increase difficulty
            o.speed = Math.random()*2 + fallSpeed;

            document.getElementById("score").textContent = score;
        }

        // Collision Detection
        if(player.x < o.x + o.w &&
           player.x + player.w > o.x &&
           player.y < o.y + o.h &&
           player.y + player.h > o.y){
               endGame();
        }
    });

    requestAnimationFrame(update);
}

// End Game
function endGame(){
    gameOver = true;
    clearInterval(reverseTimer);
    if(score > localHigh) {
        localHigh = score;
        localStorage.setItem('reverseHighScore', localHigh);
        window.saveHighScore(score);
        alert(`New High Score! ${score}\nGame Over!`);
    } else {
        alert(`Game Over! Final Score: ${score}\nPersonal High: ${localHigh}`);
    }
}

// Restart
function restartGame(){
    clearInterval(reverseTimer);
    init();
    update();
}

// Start Game
init();
update();
</script>
