<!DOCTYPE html>
<html>
<head>
<title>Don't Touch Red - Infection Mode</title>
<style>
body{
    text-align:center;
    background:#000;
    color:white;
    font-family:sans-serif;
}
canvas{
    background:#111;
    display:block;
    margin:auto;
    border:2px solid #555;
}
button{
    margin-top:10px;
    padding:8px 15px;
}
</style>
</head>
<body>

<h2>Don't Touch Red (Infection Mode)</h2>
<p>Time Survived: <span id="score">0</span> s</p>
<canvas id="game" width="400" height="400"></canvas>
<button onclick="location.reload()">Restart</button>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const scoreDisplay=document.getElementById("score");

let player={x:200,y:200,r:15};
let balls=[];
let gameOver=false;
let startTime=Date.now();
let speedMultiplier=1;

// Mouse movement
canvas.addEventListener("mousemove",e=>{
let rect=canvas.getBoundingClientRect();
player.x=e.clientX-rect.left;
player.y=e.clientY-rect.top;
});

// Create balls
for(let i=0;i<12;i++){
balls.push({
x:Math.random()*400,
y:Math.random()*400,
r:10,
dx:(Math.random()-0.5)*4,
dy:(Math.random()-0.5)*4,
color: i<3 ? "red":"blue"
});
}

function update(){

if(gameOver) return;

ctx.clearRect(0,0,400,400);

// Keep player inside
player.x=Math.max(player.r,Math.min(400-player.r,player.x));
player.y=Math.max(player.r,Math.min(400-player.r,player.y));

// Draw player
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fill();

// Move balls
balls.forEach(b=>{
b.x+=b.dx*speedMultiplier;
b.y+=b.dy*speedMultiplier;

if(b.x<0||b.x>400) b.dx*=-1;
if(b.y<0||b.y>400) b.dy*=-1;
});

// 🔥 Infection Logic (Blue → Red)
for(let i=0;i<balls.length;i++){
for(let j=0;j<balls.length;j++){
if(i===j) continue;

let a=balls[i];
let b=balls[j];

let dist=Math.hypot(a.x-b.x,a.y-b.y);

if(dist < a.r + b.r){
if(a.color==="red" && b.color==="blue"){
b.color="red";
}
if(b.color==="red" && a.color==="blue"){
a.color="red";
}
}
}
}

// Draw balls + check player collision
balls.forEach(b=>{
ctx.fillStyle=b.color;
ctx.beginPath();
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fill();

let dist=Math.hypot(player.x-b.x,player.y-b.y);
if(dist<player.r+b.r && b.color==="red"){
gameOver=true;
ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText("GAME OVER",110,200);
ctx.font="18px Arial";
ctx.fillText("You survived: "+scoreDisplay.textContent+" seconds",100,240);
}
});

// Survival time
let timeSurvived=((Date.now()-startTime)/1000).toFixed(1);
scoreDisplay.textContent=timeSurvived;

// Increase speed slowly
speedMultiplier+=0.0005;

requestAnimationFrame(update);
}

update();
</script>

  // Call this function when the game ends / highscore is achieved

  function saveHighScore(scoreValue) {
    let playerName = prompt("Enter your name (or leave blank):") || "Anonymous";

    const scoresRef = ref(db, `highscores/${GAME_KEY}`);

    push(scoresRef, {
      name: playerName,
      score: scoreValue,
      timestamp: Date.now()
    })
    .then(() => {
      alert(`High score saved!\n${playerName}: ${scoreValue}${IS_TIME_GAME ? ' seconds' : ''}`);
    })
