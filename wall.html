<!DOCTYPE html>
<html>
<head>
<title>Escape the Walls</title>
<style>
body{
    text-align:center;
    background:#111;
    color:white;
    font-family:sans-serif;
}
canvas{
    background:#222;
    display:block;
    margin:auto;
    border:2px solid #555;
}
button{
    margin-top:10px;
    padding:8px 15px;
}
</style>
</head>
<body>

<h2>Escape the Walls</h2>
<p>Score: <span id="score">0</span></p>
<canvas id="game" width="400" height="400"></canvas>
<button onclick="location.reload()">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

let player = {x:180, y:350, width:50, height:15, speed:5};
let wallY = 0;
let gapX = 100;
let gapWidth = 120;
let speed = 2;
let score = 0;
let localHigh = parseInt(localStorage.getItem('wallHighScore')) || 0;
let gameOver = false;

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function update(){
    if(gameOver) {
        // Continue drawing game over screen
        ctx.clearRect(0,0,400,400);
        ctx.fillStyle = "cyan";
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = "red";
        ctx.fillRect(0, wallY, gapX, 20);
        ctx.fillRect(gapX+gapWidth, wallY, 400-(gapX+gapWidth), 20);
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("GAME OVER", 110, 200);
        ctx.font = "18px Arial";
        ctx.fillText("Final Score: " + score, 140, 240);
        requestAnimationFrame(update);
        return;
    }

    ctx.clearRect(0,0,400,400);

    // Move player
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;

    // Keep inside canvas
    player.x = Math.max(0, Math.min(400-player.width, player.x));

    // Draw player
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // Draw walls
    ctx.fillStyle = "red";
    ctx.fillRect(0, wallY, gapX, 20);
    ctx.fillRect(gapX+gapWidth, wallY, 400-(gapX+gapWidth), 20);

    wallY += speed;

    // When wall reaches player
    if(wallY + 20 >= player.y){

        // Collision check
        if(player.x < gapX || player.x + player.width > gapX + gapWidth){
            gameOver = true;
            if(score > localHigh) {
                localHigh = score;
                localStorage.setItem('wallHighScore', localHigh);
                window.saveHighScore(score);
                alert(`New High Score! ${score}\nGame Over!`);
            } else {
                alert(`Game Over! Score: ${score}\nPersonal High: ${localHigh}`);
            }
            return;
        }

        // Passed successfully → increase score
        score++;
        scoreDisplay.textContent = score;

        // Reset wall
        wallY = 0;
        gapWidth = Math.max(60, 120 - score*2); // smaller gap
        gapX = Math.random() * (400 - gapWidth);
        speed += 0.2;
    }

    requestAnimationFrame(update);
}

update();
</script>

    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ───────────────────────────────────────────────
    // CHANGE THESE TWO LINES FOR EACH GAME

    const GAME_KEY = "wall";          // ← change this: "dino", "red", "circle", "chain", etc.
    const IS_TIME_GAME = false;        // ← change to true for time-based games (lower time = better)

    // ───────────────────────────────────────────────
    // Call this function when the game ends / highscore is achieved

    function saveHighScore(scoreValue) {
        let playerName = prompt("Enter your name (or leave blank):") || "Anonymous";

        const scoresRef = ref(db, `highscores/${GAME_KEY}`);

        push(scoresRef, {
            name: playerName,
            score: scoreValue,
            timestamp: Date.now()
        })
        .then(() => {
            console.log(`High score saved for ${GAME_KEY}!`);
        })
        .catch((error) => {
            console.error("Error saving score:", error);
            alert("Could not save score. Check internet.");
        });
    }

    window.saveHighScore = saveHighScore;
</script>
</body>
</html>
