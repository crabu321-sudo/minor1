<!DOCTYPE html>
<html>
<head>
    <title>Car Dodge Game</title>
    <style>
        body { text-align:center; font-family:sans-serif; background:#f0f0f0; }
        canvas { background:#87CEEB; display:block; margin:auto; border:2px solid #333; }
        h2 { color:#333; }
    </style>
</head>
<body>
    <h2>Car Dodge Game</h2>
    <canvas id="carCanvas" width="400" height="500"></canvas>
    <p>Score: <span id="score">0</span></p>
    <p>High Score: <span id="highScore">0</span></p>
    <button onclick="location.reload()">Restart Game</button>

    <script>
    const canvas = document.getElementById("carCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");
    const highScoreDisplay = document.getElementById("highScore");

    const car = { x: 170, y: 450, width: 60, height: 100, dx: 15 };
    const obstacles = [];
    let score = 0;
    let highScore = parseInt(localStorage.getItem('doitHighScore')) || 0;
    highScoreDisplay.textContent = highScore;
    let speed = 3;
    let gameOver = false;

    let keys = {};
    document.addEventListener("keydown",(e)=>{ keys[e.code]=true; });
    document.addEventListener("keyup",(e)=>{ keys[e.code]=false; });

    function moveCar(){
        if(keys["ArrowLeft"] && car.x>0) car.x -= car.dx;
        if(keys["ArrowRight"] && car.x+car.width<canvas.width) car.x += car.dx;
    }

    class Obstacle{
        constructor(){
            this.width = Math.random()*60 + 30;
            this.height = 20;
            this.x = Math.random()*(canvas.width - this.width);
            this.y = -20;
        }
        draw(){
            ctx.fillStyle="red";
            ctx.fillRect(this.x,this.y,this.width,this.height);
        }
        update(){
            this.y += speed;
            this.draw();
        }
    }

    function spawnObstacle(){
        if(!gameOver){
            obstacles.push(new Obstacle());
            setTimeout(spawnObstacle,1500);
        }
    }
    spawnObstacle();

    function update(){
        if(gameOver) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);

        moveCar();
        ctx.fillStyle="blue";
        ctx.fillRect(car.x,car.y,car.width,car.height);

        for(let i=obstacles.length-1;i>=0;i--){
            let ob=obstacles[i];
            ob.update();
            // Check collision
            if(car.x < ob.x+ob.width && car.x+car.width > ob.x && car.y < ob.y+ob.height && car.y+car.height > ob.y){
                gameOver=true;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('doitHighScore', highScore);
                    highScoreDisplay.textContent = highScore;
                    window.saveHighScore(score);
                    alert("New High Score! " + score);
                } else {
                    alert("Game Over! Score: " + score + "\nHigh Score: " + highScore);
                }
            }
            else if(ob.y > canvas.height){
                obstacles.splice(i,1);
                score++;
                scoreDisplay.textContent=score;
                if(score%5===0) speed += 0.5; // increase difficulty
            }
        }

        requestAnimationFrame(update);
    }

    update();
    </script>
    <script type="module">
        // ───────────────────────────────────────────────
        // Firebase imports
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, push } from "firebase/database";

        // Your Firebase config (same in all files)
        const firebaseConfig = {
            apiKey: "AIzaSyBXOT2qzwZBU6wZcOehquWl-8J5X5qeO-w",
            authDomain: "mygamingplatform-ef2e5.firebaseapp.com",
            databaseURL: "https://mygamingplatform-ef2e5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mygamingplatform-ef2e5",
            storageBucket: "mygamingplatform-ef2e5.firebasestorage.app",
            messagingSenderId: "624947552097",
            appId: "1:624947552097:web:b1886ea30f0de84eb12f20",
            measurementId: "G-3ZXY51JHDP"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ───────────────────────────────────────────────
        // CHANGE THESE TWO LINES FOR EACH GAME

        const GAME_KEY = "doit";          // ← change this: "dino", "red", "circle", "chain", etc.
        const IS_TIME_GAME = false;        // ← change to true for time-based games (lower time = better)

        // ───────────────────────────────────────────────
        // Call this function when the game ends / highscore is achieved

        function saveHighScore(scoreValue) {
            let playerName = prompt("Enter your name (or leave blank):") || "Anonymous";

            const scoresRef = ref(db, `highscores/${GAME_KEY}`);

            push(scoresRef, {
                name: playerName,
                score: scoreValue,
                timestamp: Date.now()
            })
            .then(() => {
                console.log(`High score saved for ${GAME_KEY}!`);
            })
            .catch((error) => {
                console.error("Error saving score:", error);
                alert("Could not save score. Check internet.");
            });
        }

        window.saveHighScore = saveHighScore;
    </script>
</body>
</html>
