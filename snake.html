<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body { text-align:center; font-family:sans-serif; background:#f0f0f0; }
        canvas { background:#000; display:block; margin:auto; border:2px solid #333; }
        h2 { color:#333; }
        button { margin-top:10px; padding:8px 15px; font-size:16px; cursor:pointer; }
    </style>
</head>
<body>
    <h2>Snake Game</h2>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p>Score: <span id="score">0</span></p>
    <button onclick="location.reload()">Restart Game</button>

    <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");

    const box = 20; // size of one snake block
    let snake = [{x: 8*box, y: 8*box}]; // initial snake
    let food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
    let dir = "RIGHT"; // initial direction
    let score = 0;
    let localHigh = parseInt(localStorage.getItem('snakeHighScore')) || 0;
    let speed = 200; // initial speed in ms
    let gameOver = false;

    document.addEventListener("keydown", direction);
    function direction(event){
        if(event.keyCode == 37 && dir !== "RIGHT") dir = "LEFT";
        else if(event.keyCode == 38 && dir !== "DOWN") dir = "UP";
        else if(event.keyCode == 39 && dir !== "LEFT") dir = "RIGHT";
        else if(event.keyCode == 40 && dir !== "UP") dir = "DOWN";
    }

    function draw(){
        if(gameOver) return;

        // background
        ctx.fillStyle = "#000";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        // draw food
        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, box, box);

        // move snake
        let headX = snake[0].x;
        let headY = snake[0].y;

        if(dir === "LEFT") headX -= box;
        if(dir === "RIGHT") headX += box;
        if(dir === "UP") headY -= box;
        if(dir === "DOWN") headY += box;

        // check collision with wall
        if(headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height) {
            gameOver = true;
            if(score > localHigh) {
                localHigh = score;
                localStorage.setItem('snakeHighScore', localHigh);
                window.saveHighScore(score);
                alert(`New High Score! ${score}\nGame Over!`);
            } else {
                alert(`Game Over! Score: ${score}\nPersonal High: ${localHigh}`);
            }
            return;
        }

        // check collision with itself
        for(let i=0;i<snake.length;i++){
            if(headX === snake[i].x && headY === snake[i].y){
                gameOver = true;
                if(score > localHigh) {
                    localHigh = score;
                    localStorage.setItem('snakeHighScore', localHigh);
                    window.saveHighScore(score);
                    alert(`New High Score! ${score}\nGame Over!`);
                } else {
                    alert(`Game Over! Score: ${score}\nPersonal High: ${localHigh}`);
                }
                return;
            }
        }

        // add new head
        snake.unshift({x: headX, y: headY});

        // eat food
        if(headX === food.x && headY === food.y){
            score++;
            scoreDisplay.textContent = score;
            // increase speed every 5 points
            if(score % 5 === 0 && speed > 50) speed -= 10;
            // place new food
            food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
        } else {
            snake.pop(); // remove tail if not eating
        }

        // draw snake
        ctx.fillStyle = "lime";
        for(let i=0;i<snake.length;i++){
            ctx.fillRect(snake[i].x, snake[i].y, box, box);
        }

        // next frame
        setTimeout(draw, speed);
    }

    draw();
    </script>
    <script type="module">

        // Firebase imports
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, push } from "firebase/database";

        const firebaseConfig = {

            authDomain: "mygamingplatform-ef2e5.firebaseapp.com",
            databaseURL: "https://mygamingplatform-ef2e5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mygamingplatform-ef2e5",
            storageBucket: "mygamingplatform-ef2e5.firebasestorage.app",
            messagingSenderId: "624947552097",
            appId: "1:624947552097:web:b1886ea30f0de84eb12f20",
            measurementId: "G-3ZXY51JHDP"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ───────────────────────────────────────────────
        // CHANGE THESE TWO LINES FOR EACH GAME

        const GAME_KEY = "snake";          // ← change this: "dino", "red", "circle", "chain", etc.
        const IS_TIME_GAME = false;        // ← change to true for time-based games (lower time = better)

        // ───────────────────────────────────────────────
        // Call this function when the game ends / highscore is achieved

        function saveHighScore(scoreValue) {
            let playerName = prompt("Enter your name (or leave blank):") || "Anonymous";

            const scoresRef = ref(db, `highscores/${GAME_KEY}`);

            push(scoresRef, {
                name: playerName,
                score: scoreValue,
                timestamp: Date.now()
            })
            .then(() => {
                console.log(`High score saved for ${GAME_KEY}!`);
            })
            .catch((error) => {
                console.error("Error saving score:", error);
                alert("Could not save score. Check internet.");
            });
        }

        window.saveHighScore = saveHighScore;
    </script>
</body>

</html>
