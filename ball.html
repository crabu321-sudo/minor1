<!DOCTYPE html>
<html>
<head>
    <title>Ball Catch Game</title>
    <style>
        body { text-align:center; font-family:sans-serif; background:#f0f0f0; }
        canvas { background:#87CEEB; display:block; margin:auto; border:2px solid #333; }
        h2 { color:#333; }
        button { margin-top:10px; padding:8px 15px; font-size:16px; cursor:pointer; }
    </style>
</head>
<body>
    <h2>Ball Catch Game</h2>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <p>Score: <span id="score">0</span></p>
    <button onclick="location.reload()">Restart Game</button>

    <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");

    // Paddle settings
    let paddle = {
        x: 250,
        y: 370,
        width: 100,
        height: 15,
        dx: 12 // User-friendly speed
    };

    let balls = [];
    let score = 0;
    let localHigh = parseInt(localStorage.getItem('ballHighScore')) || 0;
    let speed = 2; // initial ball falling speed
    let gameOver = false;

    // Key handling for smooth movement
    let keys = {};
    document.addEventListener("keydown", (e) => { keys[e.code] = true; });
    document.addEventListener("keyup", (e) => { keys[e.code] = false; });

    function movePaddle() {
        if(keys["ArrowLeft"]) paddle.x -= paddle.dx;
        if(keys["ArrowRight"]) paddle.x += paddle.dx;
        // Prevent paddle from going out of bounds
        if(paddle.x < 0) paddle.x = 0;
        if(paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
    }

    // Ball class
    class Ball {
        constructor() {
            this.radius = 15;
            this.x = Math.random() * (canvas.width - this.radius*2) + this.radius;
            this.y = -20;
        }
        draw() {
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.closePath();
        }
        update() {
            this.y += speed;
            this.draw();
        }
    }

    // Spawn balls sequentially (one at a time)
    function spawnBall() {
        if(!gameOver) {
            balls.push(new Ball());
            setTimeout(spawnBall, 1500); // next ball after 1.5s
        }
    }
    spawnBall();

    // Game update loop
    function update() {
        if(gameOver) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        movePaddle(); // move paddle based on keys

        // Draw paddle
        ctx.fillStyle = "green";
        ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

        // Update balls
        for(let i = balls.length - 1; i >= 0; i--){
            let b = balls[i];
            b.update();

            // Check if caught
            if(b.y + b.radius >= paddle.y && b.x >= paddle.x && b.x <= paddle.x + paddle.width){
                balls.splice(i, 1);
                score++;
                scoreDisplay.textContent = score;
                // Increase ball speed every 5 points
                if(score % 5 === 0) speed += 0.5;
            }
            // Check if missed
            else if(b.y - b.radius > canvas.height){
                gameOver = true;
                if(score > localHigh) {
                    localHigh = score;
                    localStorage.setItem('ballHighScore', localHigh);
                    window.saveHighScore(score);
                    alert(`New High Score! ${score}\nGame Over!`);
                } else {
                    alert(`Game Over! Score: ${score}\nPersonal High: ${localHigh}`);
                }
                return;
            }
        }

        requestAnimationFrame(update);
    }

    update();
    </script>
    <script type="module">

        // Firebase imports
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, push } from "firebase/database";

            authDomain: "mygamingplatform-ef2e5.firebaseapp.com",
            databaseURL: "https://mygamingplatform-ef2e5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mygamingplatform-ef2e5",
            storageBucket: "mygamingplatform-ef2e5.firebasestorage.app",
            messagingSenderId: "624947552097",
            appId: "1:624947552097:web:b1886ea30f0de84eb12f20",
            measurementId: "G-3ZXY51JHDP"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ───────────────────────────────────────────────
        // CHANGE THESE TWO LINES FOR EACH GAME

        const GAME_KEY = "ball";          // ← change this: "dino", "red", "circle", "chain", etc.
        const IS_TIME_GAME = false;        // ← change to true for time-based games (lower time = better)

        // ───────────────────────────────────────────────
        // Call this function when the game ends / highscore is achieved

        function saveHighScore(scoreValue) {
            let playerName = prompt("Enter your name (or leave blank):") || "Anonymous";

            const scoresRef = ref(db, `highscores/${GAME_KEY}`);

            push(scoresRef, {
                name: playerName,
                score: scoreValue,
                timestamp: Date.now()
            })
            .then(() => {
                console.log(`High score saved for ${GAME_KEY}!`);
            })
            .catch((error) => {
                console.error("Error saving score:", error);
                alert("Could not save score. Check internet.");
            });
        }

        window.saveHighScore = saveHighScore;
    </script>
</body>
</html>
