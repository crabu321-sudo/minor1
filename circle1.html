<!DOCTYPE html>
<html>
<head>
    <title>Click the Circle Game</title>
    <style>
        body { text-align:center; font-family:sans-serif; background:#f0f0f0; }
        canvas { background:#fff; display:block; margin:auto; border:2px solid #333; }
        h2 { color:#333; }
        #timer { font-size: 20px; margin-top: 5px; }
    </style>
</head>
<body>
    <h2>Click the Circle Game</h2>
    <canvas id="clickCanvas" width="500" height="400"></canvas>
    <p>Score: <span id="score">0</span></p>
    <p>High Score: <span id="highScore">0</span></p>
    <p>Time Left: <span id="timer">3.0</span> s</p>
    <button onclick="location.reload()">Restart Game</button>

    <script>
    const canvas = document.getElementById("clickCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");
    const highScoreDisplay = document.getElementById("highScore");
    const timerDisplay = document.getElementById("timer");

    let score = 0;
    let highScore = parseInt(localStorage.getItem('circle1HighScore')) || 0;
    highScoreDisplay.textContent = highScore;
    
    let circle = {x: 100, y: 100, radius: 30};
    let maxTime = 3.0; // max allowed time
    let minTime = 1.0; // minimum allowed time
    let timeLeft = maxTime; 
    let lastTime = Date.now();
    let gameOver = false;

    function drawCircle() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(circle.x, circle.y, circle.radius, 0, Math.PI*2);
        ctx.fill();
        ctx.closePath();
    }

    function randomCircle() {
        circle.x = Math.random()*(canvas.width - circle.radius*2) + circle.radius;
        circle.y = Math.random()*(canvas.height - circle.radius*2) + circle.radius;

        // Set timer based on score (shrinking from 3s to 1s)
        timeLeft = Math.max(maxTime - score*0.2, minTime); 
        lastTime = Date.now();

        drawCircle();
    }

    canvas.addEventListener("click", function(e){
        if(gameOver) return;

        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const distance = Math.hypot(mx - circle.x, my - circle.y);
        if(distance <= circle.radius){
            score++;
            scoreDisplay.textContent = score;
            randomCircle();
        }
    });

    function update() {
        if(gameOver) return;

        // Countdown timer
        const now = Date.now();
        const delta = (now - lastTime) / 1000;
        timeLeft -= delta;
        lastTime = now;

        timerDisplay.textContent = timeLeft.toFixed(1);

        if(timeLeft <= 0){
            gameOver = true;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('circle1HighScore', highScore);
                highScoreDisplay.textContent = highScore;
                window.saveHighScore(score);
                alert("New High Score! " + score);
            } else {
                alert("Game Over!\nScore: " + score + "\nHigh Score: " + highScore);
            }
            return;
        }

        requestAnimationFrame(update);
    }

    randomCircle();
    update();
    </script>
    <script type="module">
        // ───────────────────────────────────────────────
        // Firebase imports
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, push } from "firebase/database";

        // Your Firebase config (same in all files)
        const firebaseConfig = {
            apiKey: "AIzaSyBXOT2qzwZBU6wZcOehquWl-8J5X5qeO-w",
            authDomain: "mygamingplatform-ef2e5.firebaseapp.com",
            databaseURL: "https://mygamingplatform-ef2e5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mygamingplatform-ef2e5",
            storageBucket: "mygamingplatform-ef2e5.firebasestorage.app",
            messagingSenderId: "624947552097",
            appId: "1:624947552097:web:b1886ea30f0de84eb12f20",
            measurementId: "G-3ZXY51JHDP"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ───────────────────────────────────────────────
        // CHANGE THESE TWO LINES FOR EACH GAME

        const GAME_KEY = "circle1";          // ← change this: "dino", "red", "circle", "chain", etc.
        const IS_TIME_GAME = false;        // ← change to true for time-based games (lower time = better)

        // ───────────────────────────────────────────────
        // Call this function when the game ends / highscore is achieved

        function saveHighScore(scoreValue) {
            let playerName = prompt("Enter your name (or leave blank):") || "Anonymous";

            const scoresRef = ref(db, `highscores/${GAME_KEY}`);

            push(scoresRef, {
                name: playerName,
                score: scoreValue,
                timestamp: Date.now()
            })
            .then(() => {
                console.log(`High score saved for ${GAME_KEY}!`);
            })
            .catch((error) => {
                console.error("Error saving score:", error);
                alert("Could not save score. Check internet.");
            });
        }

        window.saveHighScore = saveHighScore;
    </script>
</body>
</html>
